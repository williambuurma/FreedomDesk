<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="FreedomDesk — operating companion for dental practices." />
  <meta name="robots" content="noindex, nofollow" />
  <title>FreedomDesk</title>
  <link rel="icon" href="../favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png" />
  <link rel="apple-touch-icon" href="../apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles/theme.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/dashboard.css" />
  <link rel="stylesheet" href="styles/decision-card.css" />
  <link rel="stylesheet" href="styles/morning-brief.css" />
  <link rel="stylesheet" href="styles/my-day.css" />
  <link rel="stylesheet" href="styles/intelligence-inbox.css" />
  <link rel="stylesheet" href="styles/coordination-panel.css" />
</head>
<body class="fd-companion">
  <!-- Local preview context only — not part of the product. Simulates the PMS FreedomDesk sits beside. -->
  <div class="fd-pms-stage" aria-hidden="true">
    <div class="fd-pms-chrome">
      <div class="fd-pms-chrome-dot"></div>
      <div class="fd-pms-chrome-dot"></div>
      <div class="fd-pms-chrome-dot"></div>
      <span class="fd-pms-chrome-label">Practice management software</span>
    </div>
    <div class="fd-pms-body">
      <div class="fd-pms-rail"></div>
      <div class="fd-pms-grid">
        <div class="fd-pms-block fd-pms-block-wide"></div>
        <div class="fd-pms-block"></div>
        <div class="fd-pms-block"></div>
        <div class="fd-pms-block fd-pms-block-tall"></div>
        <div class="fd-pms-block"></div>
        <div class="fd-pms-block"></div>
      </div>
    </div>
    <p class="fd-pms-caption">FreedomDesk stays here — beside the schedule, all day.</p>
  </div>

  <div class="fd-app-shell" id="fdAppShell">
    <div class="fd-companion-panel" id="fdCompanion" role="application" aria-label="FreedomDesk companion">
      <aside class="fd-sidebar" id="fdSidebar" aria-label="Workspaces">
        <div class="fd-sidebar-brand">
          <a href="index.html" class="fd-sidebar-logo" aria-label="FreedomDesk">
            <img
              src="../assets/logos/FreedomDesk%20Icon.png?v=20260706"
              alt=""
              class="fd-sidebar-logo-icon"
              width="128"
              height="128"
              decoding="async"
              aria-hidden="true"
            />
          </a>
        </div>

        <nav class="fd-sidebar-nav" aria-label="Companion workspaces">
          <ul id="fdModuleNav"></ul>
        </nav>

        <div class="fd-sidebar-footer">
          <div class="fd-profile" id="fdProfileWrap">
            <button
              type="button"
              class="fd-profile-trigger"
              id="fdProfileTrigger"
              aria-label="Practice menu"
              aria-haspopup="menu"
              aria-expanded="false"
              aria-controls="fdProfileMenu"
              title="Settings"
            >
              <svg class="fd-profile-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
              <span class="fd-profile-label">Settings</span>
            </button>
            <div
              class="fd-profile-menu"
              id="fdProfileMenu"
              role="menu"
              aria-label="Practice menu"
              hidden
              aria-hidden="true"
            >
              <button type="button" class="fd-profile-item" role="menuitem" data-module="settings">
                Settings
              </button>
            </div>
          </div>
        </div>
      </aside>

      <div class="fd-companion-main">
        <header class="fd-companion-header">
          <h1 class="fd-module-title" id="fdModuleTitle">Today</h1>
          <div class="fd-companion-header-actions" hidden aria-hidden="true">
            <!-- Notes / Team open from context panels when needed — not always-on chrome -->
            <button
              type="button"
              class="fd-coord-trigger"
              id="fdCoordOpenNotes"
              aria-label="Notes"
              title="Notes"
              hidden
            >
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                <path d="M12 20h9"/>
                <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
              </svg>
            </button>
            <button
              type="button"
              class="fd-coord-trigger fd-coord-trigger--team"
              id="fdCoordOpenTeam"
              aria-label="Team messages"
              title="Team"
              hidden
            >
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
            </button>
          </div>
        </header>

        <main class="fd-companion-content fd-dashboard-content" id="fdDashboardContent" aria-live="polite">
          <!-- Compact workspace modules render here -->
        </main>
      </div>
    </div>
  </div>

  <div class="fd-coord-overlay" id="fdCoordOverlay" hidden aria-hidden="true">
    <aside
      class="fd-coord-panel"
      id="fdCoordPanel"
      role="dialog"
      aria-modal="true"
      aria-labelledby="fdCoordTitle"
      data-coord-mode="workspace"
      hidden
    >
      <header class="fd-coord-header">
        <div class="fd-coord-header-row">
          <button type="button" class="fd-coord-close" id="fdCoordClose" aria-label="Close panel">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M18 6L6 18M6 6l12 12"/>
            </svg>
          </button>
          <h2 class="fd-coord-title" id="fdCoordTitle">Notes</h2>
        </div>
        <nav class="fd-coord-tabs" id="fdCoordTabs" role="tablist" aria-label="Coordination">
          <button
            type="button"
            class="fd-coord-tab"
            role="tab"
            id="fdCoordTabNotes"
            data-coord-tab="notes"
            aria-selected="true"
            aria-controls="fdCoordBody"
          >
            Notes
          </button>
          <button
            type="button"
            class="fd-coord-tab"
            role="tab"
            id="fdCoordTabTeam"
            data-coord-tab="team"
            aria-selected="false"
            aria-controls="fdCoordBody"
            tabindex="-1"
            hidden
          >
            Team
            <span class="fd-coord-tab-badge">Soon</span>
          </button>
        </nav>
      </header>
      <div class="fd-coord-body" id="fdCoordBody" role="tabpanel" aria-labelledby="fdCoordTabNotes"></div>
      <footer class="fd-coord-footer" id="fdCoordFooter" hidden>
        <p class="fd-coord-related-label">Related context</p>
      </footer>
    </aside>
  </div>

  <script src="shared/registry.js"></script>
  <script src="shared/utils.js"></script>
  <script src="shared/labels.js"></script>
  <script src="shared/practice-staff.js"></script>
  <script src="shared/context-engine.js"></script>
  <script src="shared/components/dashboard-ui.js"></script>
  <script src="shared/coordination-panel.js"></script>
  <script src="shared/placeholder-module.js"></script>
  <script src="modules/morning-brief/morning-brief.js"></script>
  <script src="modules/morning-brief/module.js"></script>
  <script src="modules/today/today.js"></script>
  <script src="modules/today/module.js"></script>
  <script src="modules/my-day/module.js"></script>
  <script src="modules/intelligence-inbox/intelligence-inbox.js"></script>
  <script src="modules/intelligence-inbox/module.js"></script>
  <script src="modules/patients/patients.js"></script>
  <script src="modules/ask/ask.js"></script>
  <script src="modules/settings/settings.js"></script>
  <!-- Companion workspaces: Today · Patients · Ask. Settings via footer. -->
  <script src="dashboard.js"></script>
</body>
</html>
