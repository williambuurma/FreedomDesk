<header class="mb-intro" id="mbGreeting" aria-live="polite">
  <h1 class="mb-intro-title">Good morning.</h1>
  <p class="mb-intro-subline" id="mbSubline" hidden></p>
  <p class="mb-intro-remaining" id="mbRemainingHint" hidden></p>
</header>

<div class="mb-loading" id="mbLoading" aria-busy="true">
  <p>Loading…</p>
</div>

<div class="mb-error" id="mbError" hidden>
  <p>Unable to load. Refresh.</p>
</div>

<div class="mb-brief" id="mbDashboard" hidden>
  <div class="mb-layout" id="mbDecisions" aria-label="Decisions"></div>

  <details class="mb-remaining" id="mbRemaining" hidden>
    <summary class="mb-remaining-summary">Later</summary>
    <ul class="mb-remaining-body" id="mbRemainingBody"></ul>
  </details>

  <footer class="mb-footer-note">
    <p class="mb-footer-meta">
      <span id="mbPracticeName">Cascade Family Dentistry</span>
      · <span id="mbDate">—</span>
    </p>
    <p class="mb-footer-timestamp"><time id="mbGeneratedAt">—</time></p>
  </footer>
</div>
