<div class="md-loading" id="mdLoading" aria-busy="true" aria-live="polite">
  <p>Pulling together your day…</p>
</div>

<div class="md-error" id="mdError" hidden>
  <p>Unable to load My Day. Please refresh or contact support.</p>
</div>

<!-- Receptionist workday — Sprint 2 hierarchy -->
<div class="md-dashboard md-dashboard--receptionist" id="mdReceptionistLayout" hidden>
  <header class="md-hero" id="mdGreeting"></header>

  <section class="md-panel md-panel-since" id="mdSinceLastLogin" aria-label="Since your last login"></section>

  <div class="md-workspace">
    <div class="md-workspace-primary">
      <div class="md-panel md-panel-anchor" id="mdUrgent"></div>
      <div class="md-panel" id="mdTodaysTasks"></div>
    </div>
    <aside class="md-workspace-secondary" aria-label="Later today">
      <div class="md-panel md-panel-quiet" id="mdComingUp"></div>
      <div class="md-panel md-panel-quiet" id="mdReminders"></div>
    </aside>
  </div>

  <footer class="md-closing" id="mdTodaysFocus"></footer>
</div>

<!-- Doctor view — unchanged until role-specific sprint -->
<div class="md-dashboard md-dashboard--doctor" id="mdDoctorLayout" hidden>
  <header class="md-hero" id="mdDoctorGreeting"></header>

  <div class="md-workspace">
    <div class="md-workspace-primary">
      <div class="md-panel md-panel-anchor" id="mdPriorities"></div>
    </div>
    <aside class="md-workspace-secondary" aria-label="Supporting context">
      <div class="md-panel" id="mdPatients"></div>
      <div class="md-panel" id="mdOpportunities"></div>
    </aside>
  </div>

  <div class="md-workspace-footer">
    <div class="md-panel" id="mdInsight"></div>
    <div class="md-panel" id="mdQuickActions"></div>
  </div>

  <footer class="md-closing" id="mdDoctorTodaysFocus"></footer>
</div>
