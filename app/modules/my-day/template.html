<div class="md-loading" id="mdLoading" aria-busy="true" aria-live="polite">
  <p>Pulling together your day…</p>
</div>

<div class="md-error" id="mdError" hidden>
  <p>Unable to load My Day. Please refresh or contact support.</p>
</div>

<div class="md-role-bar" id="mdRoleBar" aria-label="View as"></div>

<!-- Receptionist — approved v3 morning briefing -->
<div class="md-dashboard md-dashboard--receptionist" id="mdReceptionistLayout" hidden>
  <header class="md-hero" id="mdGreeting"></header>

  <div class="md-since-yesterday" id="mdSinceYesterday" aria-label="Since yesterday"></div>

  <div class="md-workspace">
    <div class="md-workspace-primary">
      <div class="md-panel md-panel-anchor" id="mdUrgent"></div>
      <div class="md-panel md-panel-today" id="mdToday"></div>
    </div>
    <aside class="md-workspace-secondary" aria-label="Today's reminders">
      <div class="md-panel md-panel-heads-up" id="mdHeadsUp"></div>
    </aside>
  </div>
</div>

<!-- Doctor — calm clinical workspace (same shell as receptionist) -->
<div class="md-dashboard md-dashboard--doctor" id="mdDoctorLayout" hidden>
  <header class="md-hero" id="mdDoctorGreeting"></header>

  <div class="md-workspace">
    <div class="md-workspace-primary">
      <div class="md-panel" id="mdDoctorSchedule"></div>
      <div class="md-panel" id="mdDoctorTasks"></div>
    </div>
    <aside class="md-workspace-secondary" aria-label="Clinical priorities">
      <div class="md-panel md-panel-heads-up" id="mdClinicalPriorities"></div>
    </aside>
  </div>
</div>
